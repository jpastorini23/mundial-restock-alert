name: Stock check

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stock-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install --no-audit --no-fund

      - name: Check stock
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: node check.js

      - name: Commit state if changed
        run: |
          if ! git diff --quiet state.json; then
            git config user.name "stock-monitor-bot"
            git config user.email "stock-monitor@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update stock state [skip ci]"
            git push
          else
            echo "No state change to commit."
          fi
